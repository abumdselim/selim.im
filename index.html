<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abu Md. Selim | Entrepreneur · Founder · Developer</title>
  <meta name="description" content="Personal portfolio of Abu Md. Selim - Entrepreneur, Founder, and Developer.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Sticky Header (Hidden on initial load) -->
  <header id="site-header" class="site-header">
    <div class="header-container">
      <button class="menu-toggle" aria-label="Toggle menu">
        <span class="hamburger"></span>
      </button>
      <div class="header-logo">ABU MD. SELIM</div>
      <!-- Desktop Navigation could go here, but keeping it minimal for now -->
      <nav class="desktop-nav">
        <a href="#about">About</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero Section -->
    <section id="hero" class="hero">
      
      <!-- Background Image -->
      <div class="hero-image-wrapper">
        <img 
          src="https://res.cloudinary.com/dp5ap39r6/image/upload/v1779677055/ChatGPT_Image_May_23_2026_01_53_04_AM_hrv4vp.png" 
          alt="Abu Md. Selim" 
          class="hero-image"
        >
        <!-- Gradients for readability and subtle cinematic effect -->
        <div class="hero-gradient-overlay hero-gradient-mobile-bottom"></div>
        <div class="hero-gradient-overlay hero-gradient-desktop-left"></div>
      </div>

      <!-- Hero Content (Hidden on Mobile) -->
      <div class="hero-content">
        <h1 class="hero-title">Abu Md. Selim</h1>
        <p class="hero-subtitle">Entrepreneur &middot; Founder &middot; Developer</p>
      </div>

      <!-- Scroll Indicator -->
      <button id="scroll-arrow" class="scroll-arrow" aria-label="Scroll to next section">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4L12 20M12 20L18 14M12 20L6 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </section>

    <!-- Dummy Next Section to demonstrate scroll behavior -->
    <section id="next-section" class="next-section">
      <div class="container">
        <h2>Vision & Execution</h2>
        <p>Building high-end digital experiences and robust systems.</p>
      </div>
    </section>
    
    <!-- Extra height for scrolling -->
    <section style="height: 100vh; background: #050505;"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
